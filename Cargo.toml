[package]
name = "dm-database-installer"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "dm-installer"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.1.2"
anyhow = "1.0.102"
thiserror = "2.0.18"
sha2 = "0.11.0"
indicatif = "0.18.4"
console = "0.16.3"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
tempfile = "3.27.0"
reqwest = { version = "0.13.4", default-features = false, features = ["rustls", "stream"] }
clap_complete = "4.6.5"

[dev-dependencies]
tempfile = "3.27.0"
