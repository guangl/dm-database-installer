[package]
name = "dm-database-installer"
version = "0.1.0"
edition = "2024"
description = "达梦数据库安装器 (dm-database-installer) — 单机/集群静默部署工具"
license = "MIT"
repository = "https://github.com/guangl/dm-database-installer"

[[bin]]
name = "dm-installer"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.1.2"
anyhow = "1.0.102"
thiserror = "2.0.18"
sha2 = "0.11.0"
indicatif = "0.18.4"
console = "0.16.3"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
tempfile = "3.27.0"
reqwest = { version = "0.13.4", default-features = false, features = ["rustls", "stream"] }
clap_complete = "4.6.5"
russh = { version = "0.61.2", default-features = false, features = ["async-trait", "ring"] }
async-trait = "0.1"
russh-sftp = "2.3.0"
futures = "0.3"

[dev-dependencies]
tempfile = "3.27.0"
tracing-test = "0.2"
