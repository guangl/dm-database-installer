[package]
name = "dm-database-installer"
version = "0.1.0"
edition = "2024"
description = "达梦数据库安装器 (dm-database-installer) — 单机/集群静默部署工具"
license = "MIT"
repository = "https://github.com/guangl/dm-database-installer"

[[bin]]
name = "dm-installer"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.1.2"
anyhow = "1.0.102"
thiserror = "2.0.18"
sha2 = "0.11.0"
indicatif = "0.18.4"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
tempfile = "3.27.0"
reqwest = { version = "0.13.4", default-features = false, features = ["rustls", "stream"] }
clap_complete = "4.6.5"
russh = { version = "0.61.2", default-features = false, features = ["async-trait", "ring"] }
async-trait = "0.1"
russh-sftp = "2.3.0"
futures = "0.3"
zip = { version = "2", default-features = false, features = ["deflate"] }

[dev-dependencies]
tempfile = "3.27.0"
tracing-test = "0.2"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

# 由 cargo dist init 生成（手动调整 targets 为三平台 + aarch64 配置）
[workspace.metadata.dist]
cargo-dist-version = "0.32.0"
ci = "github"
installers = ["shell", "powershell"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# 允许 release.yml 含手动添加的 NASM 步骤（不被 dist generate 覆盖）
allow-dirty = ["ci"]

[workspace.metadata.dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-22.04"

[workspace.metadata.dist.dependencies.apt]
gcc-aarch64-linux-gnu = { version = "*", targets = ["aarch64-unknown-linux-gnu"] }
