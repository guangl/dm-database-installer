name: Sync to Gitee

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 替换 install.sh 中的 VERSIONS_URL 为 Gitee 地址
        run: |
          sed -i 's|https://raw.githubusercontent.com/guangl/dm-database-installer/main/versions.txt|https://raw.giteeusercontent.com/guangluo/dm-database-installer/raw/main/versions.txt|' install.sh

      - name: 提交修改（仅推送到 Gitee，不回写 GitHub）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh
          git commit -m "chore: use Gitee versions URL [gitee-mirror]"

      - name: 推送到 Gitee
        run: |
          git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/guangluo/dm-database-installer.git
          git push gitee HEAD:main --force
